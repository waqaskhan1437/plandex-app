name: Plandex AI Agent

on:
  workflow_dispatch:

jobs:
  plandex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Plandex
        run: |
          curl -sL https://plandex.ai/install.sh | bash

      - name: Verify Plandex
        run: |
          plandex --version