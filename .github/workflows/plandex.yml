name: Plandex AI Agent

on:
  workflow_dispatch:
  repository_dispatch:
    types: [plandex_chat]

jobs:
  plandex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Plandex
        run: |
          curl -sL https://plandex.ai/install.sh | bash
          plandex version

      - name: Initialize
        run: |
          if [ ! -f "chat_history.json" ]; then
            echo '{"messages": []}' > chat_history.json
          fi

      - name: Process Message
        if: github.event_name == 'repository_dispatch'
        run: |
          MSG="${{ github.event.client_payload.message }}"
          python3 -c "
import json
import os

msg = '''Message received! I am Plandex AI running on GitHub Actions.

For real AI responses:
1. Get API key from https://console.anthropic.com
2. Add: gh secret set ANTHROPIC_API_KEY --body 'your-key'

Your message was: ''' + '''$MSG'''

timestamp = '''$(date -u +"%Y-%m-%dT%H:%M:%SZ")'''

try:
    with open('chat_history.json', 'r') as f:
        data = json.load(f)
except:
    data = {'messages': []}

data['messages'].append({'role': 'user', 'content': '''$MSG''', 'timestamp': timestamp})
data['messages'].append({'role': 'assistant', 'content': msg, 'timestamp': timestamp})
data['updated_at'] = timestamp

with open('chat_history.json', 'w') as f:
    json.dump(data, f, indent=2)

print('Chat updated!')
"

      - name: Commit
        if: github.event_name == 'repository_dispatch'
        run: |
          git config --local user.email "bot@plandex.ai"
          git config --local user.name "Plandex Bot"
          git add chat_history.json
          git commit -m "Update chat" || echo "no changes"
          git push || echo "done"

      - name: Summary
        run: |
          echo "## Chat Updated" >> $GITHUB_STEP_SUMMARY
          echo "Session saved!" >> $GITHUB_STEP_SUMMARY
