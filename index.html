<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plandex AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #161b22;
            padding: 16px 24px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        header h1 { font-size: 18px; color: #58a6ff; }
        
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        
        .icon-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .icon-btn:hover { background: #30363d; }
        
        .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #6e7681;
        }
        
        .status-dot.ready { background: #3fb950; }
        .status-dot.running { background: #f0883e; animation: pulse 1s infinite; }
        .status-dot.success { background: #58a6ff; }
        .status-dot.error { background: #f85149; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }
        
        .message.user {
            align-self: flex-end;
            background: #238636;
            color: #ffffff;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: #161b22;
            border: 1px solid #30363d;
        }
        
        .message.system {
            align-self: center;
            background: #1f6feb22;
            border: 1px solid #1f6feb;
            color: #58a6ff;
            font-size: 13px;
            text-align: center;
        }
        
        #input-container {
            background: #161b22;
            padding: 16px 24px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
        }
        
        #message-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
            color: #c9d1d9;
            font-size: 14px;
            resize: none;
        }
        
        #message-input:focus { outline: none; border-color: #58a6ff; }
        
        #send-btn {
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        #send-btn:disabled { background: #6e7681; cursor: not-allowed; }
        
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 440px;
        }
        
        .modal h2 { color: #58a6ff; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        
        .form-group input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
            color: #c9d1d9;
            font-size: 14px;
        }
        
        .form-hint { font-size: 12px; color: #6e7681; margin-top: 4px; }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .modal-btn.primary { background: #238636; color: white; }
        .modal-btn.secondary { background: transparent; border: 1px solid #30363d; color: #c9d1d9; }
        
        /* Progress */
        #progress-container {
            display: none;
            background: #161b22;
            padding: 12px 24px;
            border-top: 1px solid #30363d;
        }
        
        #progress-container.active { display: block; }
        
        .progress-bar { height: 4px; background: #30363d; border-radius: 2px; overflow: hidden; }
        
        .progress-fill { height: 100%; background: #58a6ff; width: 0%; transition: width 0.5s; }
        
        .progress-text { font-size: 12px; color: #6e7681; margin-top: 6px; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Plandex AI</h1>
        <div class="header-buttons">
            <button class="icon-btn" id="refresh-btn">🔄</button>
            <button class="icon-btn" id="settings-btn">⚙️</button>
            <div class="status">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Ready</span>
            </div>
        </div>
    </header>
    
    <div id="chat-container">
        <div class="message system">
            <b>👋 Plandex Chat</b><br>
            Session persists between messages!<br>
            ⚙️ Configure GitHub token in Settings first.
        </div>
    </div>
    
    <div id="progress-container">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Starting...</div>
    </div>
    
    <div id="input-container">
        <textarea id="message-input" placeholder="Type message..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>⚙️ Settings</h2>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="github-token" placeholder="ghp_xxx">
                <div class="form-hint">Required scopes: repo</div>
            </div>
            <div class="form-group">
                <label>Repository Owner</label>
                <input type="text" id="github-owner" placeholder="waqaskhan1437">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="github-repo" placeholder="plandex-app">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="close-settings">Cancel</button>
                <button class="modal-btn primary" id="save-settings">Save</button>
            </div>
        </div>
    </div>
    
    <script>
        let config = {
            token: localStorage.getItem('plandex_token') || '',
            owner: localStorage.getItem('plandex_owner') || 'waqaskhan1437',
            repo: localStorage.getItem('plandex_repo') || 'plandex-app'
        };
        
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const settingsModal = document.getElementById('settings-modal');
        
        let isProcessing = false;
        
        function addMessage(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function setStatus(state, text) {
            statusDot.className = `status-dot ${state}`;
            statusText.textContent = text;
        }
        
        // Load chat history
        async function loadChatHistory() {
            if (!config.token) return;
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${config.owner}/${config.repo}/contents/chat_history.json`,
                    { headers: { 'Authorization': `Bearer ${config.token}`, 'Accept': 'application/vnd.github+json' } }
                );
                
                if (response.ok) {
                    const data = await response.json();
                    const content = atob(data.content);
                    const history = JSON.parse(content);
                    
                    chatContainer.innerHTML = '';
                    
                    for (const msg of history.messages || []) {
                        addMessage(msg.content, msg.role);
                    }
                }
            } catch (e) {
                console.log('No history yet');
            }
        }
        
        // Init
        if (config.token && config.owner && config.repo) {
            loadChatHistory();
        }
        
        // Settings
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('github-token').value = config.token;
            document.getElementById('github-owner').value = config.owner;
            document.getElementById('github-repo').value = config.repo;
            settingsModal.classList.add('active');
        });
        
        document.getElementById('close-settings').addEventListener('click', () => settingsModal.classList.remove('active'));
        
        document.getElementById('save-settings').addEventListener('click', () => {
            config.token = document.getElementById('github-token').value.trim();
            config.owner = document.getElementById('github-owner').value.trim();
            config.repo = document.getElementById('github-repo').value.trim();
            
            localStorage.setItem('plandex_token', config.token);
            localStorage.setItem('plandex_owner', config.owner);
            localStorage.setItem('plandex_repo', config.repo);
            
            settingsModal.classList.remove('active');
            addMessage('✅ Settings saved!', 'system');
            loadChatHistory();
        });
        
        document.getElementById('refresh-btn').addEventListener('click', loadChatHistory);
        
        // Send message
        async function sendMessage(msg) {
            if (!config.token) {
                addMessage('⚠️ Configure token in Settings!', 'system');
                settingsModal.classList.add('active');
                return;
            }
            
            isProcessing = true;
            sendBtn.disabled = true;
            addMessage(msg, 'user');
            setStatus('running', 'Sending...');
            progressContainer.classList.add('active');
            
            try {
                // Trigger workflow
                const response = await fetch(
                    `https://api.github.com/repos/${config.owner}/${config.repo}/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${config.token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github+json'
                        },
                        body: JSON.stringify({
                            event_type: 'plandex_chat',
                            client_payload: { message: msg }
                        })
                    }
                );
                
                if (!response.ok) throw new Error('API error');
                
                setStatus('running', 'Processing...');
                progressFill.style.width = '50%';
                progressText.textContent = 'Waiting for Plandex (30-60s)...';
                
                // Poll for completion
                await pollForCompletion();
                
            } catch (error) {
                addMessage('❌ Error: ' + error.message, 'system');
                setStatus('error', 'Error');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }
        
        async function pollForCompletion() {
            for (let i = 0; i < 30; i++) {
                await new Promise(r => setTimeout(r, 2000));
                
                const response = await fetch(
                    `https://api.github.com/repos/${config.owner}/${config.repo}/actions/runs?per_page=1`,
                    { headers: { 'Authorization': `Bearer ${config.token}`, 'Accept': 'application/vnd.github+json' } }
                );
                
                if (!response.ok) continue;
                
                const data = await response.json();
                const run = data.workflow_runs?.[0];
                
                if (!run) continue;
                
                progressFill.style.width = (50 + (i/30)*40) + '%';
                
                if (run.status === 'completed') {
                    progressFill.style.width = '100%';
                    progressText.textContent = 'Complete!';
                    
                    if (run.conclusion === 'success') {
                        setStatus('success', 'Done');
                        addMessage('✅ Message processed! Refreshing chat...', 'system');
                        
                        // Wait for commit then reload
                        await new Promise(r => setTimeout(r, 3000));
                        await loadChatHistory();
                    } else {
                        setStatus('error', 'Failed');
                        addMessage('❌ Failed. Check GitHub Actions.', 'system');
                    }
                    
                    progressContainer.classList.remove('active');
                    return;
                }
            }
            
            setStatus('error', 'Timeout');
            addMessage('⏱️ Timeout. Try refreshing.', 'system');
            progressContainer.classList.remove('active');
        }
        
        sendBtn.addEventListener('click', () => {
            const msg = messageInput.value.trim();
            if (msg && !isProcessing) {
                messageInput.value = '';
                sendMessage(msg);
            }
        });
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
