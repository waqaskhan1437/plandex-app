<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plandex AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #161b22;
            padding: 16px 24px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        header h1 {
            font-size: 20px;
            color: #58a6ff;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6e7681;
        }
        
        .status-dot.ready {
            background: #3fb950;
        }
        
        .status-dot.running {
            background: #f0883e;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }
        
        .message.user {
            align-self: flex-end;
            background: #238636;
            color: #ffffff;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: #161b22;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .message.system {
            align-self: center;
            background: #1f6feb22;
            border: 1px solid #1f6feb;
            color: #58a6ff;
            font-size: 14px;
        }
        
        #input-container {
            background: #161b22;
            padding: 16px 24px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
        }
        
        #message-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
            color: #c9d1d9;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        #message-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        #send-btn {
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        #send-btn:hover:not(:disabled) {
            background: #2ea043;
        }
        
        #send-btn:disabled {
            background: #6e7681;
            cursor: not-allowed;
        }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Plandex AI Chat</h1>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Ready</span>
        </div>
    </header>
    
    <div id="chat-container">
        <div class="message system">
            👋 Welcome to Plandex AI Chat!
            <br><br>
            This chat interface communicates with Plandex AI agent running on GitHub Actions.
            <br><br>
            ⚠️ Note: Each message triggers a GitHub Actions workflow run. This may take 30-60 seconds.
        </div>
    </div>
    
    <div id="input-container">
        <textarea id="message-input" placeholder="Type your message to Plandex..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>
    
    <script>
        const REPO_OWNER = 'waqaskhan1437';
        const REPO_NAME = 'plandex-app';
        const TOKEN = ''; // Will be prompted if empty
        
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let isProcessing = false;
        
        function addMessage(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function setStatus(state, text) {
            statusDot.className = `status-dot ${state}`;
            statusText.textContent = text;
        }
        
        async function triggerAction(message) {
            const token = TOKEN || prompt('Enter your GitHub Personal Access Token:\n(Need repo scope)');
            if (!token) {
                addMessage('GitHub token required. Please refresh and enter token.', 'system');
                return;
            }
            
            setStatus('running', 'Running Plandex...');
            isProcessing = true;
            sendBtn.disabled = true;
            
            addMessage(message, 'user');
            
            try {
                // Trigger repository dispatch event
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        event_type: 'plandex_chat',
                        client_payload: {
                            message: message
                        }
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }
                
                addMessage('⏳ Action triggered. Waiting for Plandex to respond...', 'system');
                
                // Poll for workflow run
                await pollWorkflowRun(token, message);
                
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'system');
                setStatus('ready', 'Ready');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }
        
        async function pollWorkflowRun(token, userMessage) {
            let attempts = 0;
            const maxAttempts = 30;
            
            while (attempts < maxAttempts) {
                await new Promise(resolve => setTimeout(resolve, 2000));
                attempts++;
                
                // Check for latest workflow run
                const runsResponse = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs?per_page=1`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github+json'
                        }
                    }
                );
                
                if (!runsResponse.ok) continue;
                
                const data = await runsResponse.json();
                const latestRun = data.workflow_runs?.[0];
                
                if (!latestRun || latestRun.status === 'queued') {
                    setStatus('running', 'Queued...');
                    continue;
                }
                
                if (latestRun.status === 'in_progress') {
                    setStatus('running', 'Running...');
                    continue;
                }
                
                if (latestRun.conclusion === 'success') {
                    // Get workflow logs
                    const logsResponse = await fetch(
                        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${latestRun.id}/logs`,
                        {
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github+json'
                            }
                        }
                    );
                    
                    setStatus('ready', 'Ready');
                    addMessage('✅ Plandex execution completed! Check GitHub Actions for full output.', 'assistant');
                    return;
                }
                
                if (latestRun.conclusion === 'failure') {
                    setStatus('ready', 'Failed');
                    addMessage('❌ Plandex execution failed. Check GitHub Actions logs.', 'assistant');
                    return;
                }
            }
            
            setStatus('ready', 'Timeout');
            addMessage('⏱️ Timeout waiting for response.', 'system');
        }
        
        sendBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message && !isProcessing) {
                messageInput.value = '';
                triggerAction(message);
            }
        });
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
        
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
